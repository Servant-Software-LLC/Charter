name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - name: Build
        run: dotnet build Charter.sln -c Release
      - name: Test
        run: dotnet test Charter.sln -c Release --no-build
